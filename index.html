<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no" />
<title>엘리아스 아케이드</title>
<style>
  /* --- 공통 CSS --- */
  :root {
    --bg: #0b0f14; --panel: #111827; --text: #111827; --muted: #6b7280; --accent: #8b5cf6; --btn: #1f2937;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; touch-action: manipulation; }
  body {
    background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    position: relative;
  }
  body::before{
    content:""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: url("이미지/배경.png") center/cover no-repeat fixed;
  }
  .wrap { min-height: 100%; display:flex; align-items:center; justify-content:center; padding:24px; position: relative; z-index: 1;}
  .card { width: min(860px, 96vw); background: #ffffff; border-radius: 18px; box-shadow: 0 20px 80px rgba(0,0,0,.25); padding: 40px; position: relative; overflow: hidden;}
  
  .header { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 800; font-size: 24px; color: var(--accent); margin-bottom: 20px;}
  .header .dot { width:10px; height:10px; border-radius:50%; background: var(--accent); box-shadow:0 0 10px var(--accent); }
  .title { font-size: clamp(22px, 3.5vw, 30px); font-weight: 800; line-height:1.2; text-align: center; }
  
  .btn {
    display:inline-flex; align-items:center; justify-content:center;
    background: linear-gradient(180deg, var(--accent), #6d28d9);
    border:none; color:white; padding:14px 20px; border-radius:12px;
    font-weight:700; cursor:pointer; box-shadow:0 10px 30px rgba(139,92,246,.35); transition:filter .2s ease;
  }
  .btn:hover { filter: brightness(1.07); }
  
  .qbox { margin-top: 16px; padding:25px; background: #f9fafb; border:1px solid rgba(0,0,0,.05); border-radius:14px; text-align:left; }
  .qtitle { font-size: clamp(18px, 2.5vw, 22px); font-weight:800; margin-top:10px; margin-bottom: 20px;}
  .opts { display:grid; gap:12px; }
  .opt { background:#ffffff; border:1px solid #e5e7eb; padding:15px; border-radius:12px; cursor:pointer; text-align:left; font-weight: 600; transition: all 0.2s; }
  .opt:hover { background:#f5f3ff; border-color: var(--accent); transform: translateX(5px); }
  .pill { padding:4px 12px; border-radius:999px; background:rgba(139,92,246,.15); color:#6d28d9; font-size:14px; font-weight: 800; display: inline-block; }

  /* 메인 메뉴 CSS */
  .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 30px; }
  .menu-btn { padding: 30px; border-radius: 16px; border: 2px solid #f3f4f6; background: #f9fafb; cursor: pointer; transition: all 0.2s; text-align: center; display:flex; flex-direction:column; justify-content:center;}
  .menu-btn:hover { border-color: var(--accent); background: #f5f3ff; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(139,92,246,0.1); }
  .menu-btn h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 20px; font-weight: 800; }
  .menu-btn p { color: #4b5563; font-size: 14px; line-height: 1.5; margin-top: 10px; }

  /* 진단 결과 CSS */
  .result { display:grid; grid-template-columns:330px 1fr; gap:20px; text-align: left; }
  @media (max-width:780px){ .result{grid-template-columns:1fr;} }
  .portrait img { width:100%; border-radius:12px; border:1px solid rgba(0,0,0,.1); }
  .name { margin-top:10px; font-size:24px; font-weight:800; }
  .desc { color:#6b7280; margin-bottom: 20px;}

  /* 정체성 결과 전용 CSS */
  .identity-result-box { text-align: center; background: #ffffff; }
  .id-result-images { display: flex; justify-content: space-around; gap: 10px; margin: 30px 0; }
  .id-image-item { flex: 1; text-align: center; background: #f9fafb; padding: 15px; border-radius: 12px; border: 1px solid #e5e7eb; }
  .id-image-item img { width: 100%; max-width: 150px; aspect-ratio: 1; object-fit: cover; border-radius: 12px; border: 2px solid #ddd6fe; margin-bottom: 10px; }
  .id-image-label { font-size: 12px; color: var(--muted); font-weight: 700; margin-bottom: 4px; }
  .id-image-value { font-size: 18px; font-weight: 800; color: var(--text); }
  .id-badge { background: var(--accent); color: white; padding: 6px 14px; border-radius: 999px; font-weight: 700; font-size: 14px; margin: 0 4px; }
  .hr { height:1px; background: rgba(0,0,0,.1); margin:20px 0; }

  /* 갤러그 전용 CSS */
  #game-container {
      position: relative; width: 100%; height: 600px; max-height: 70vh; 
      background-color: #111; border-radius: 12px; overflow: hidden;
      margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5) inset;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .game-panel {
      position: absolute; inset: 0; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; color: white; z-index: 10;
      background-color: rgba(0,0,0,0.8); text-align: center;
  }
  .hidden { display: none !important; }
  .control-btn {
      width: 60px; height: 60px; background-color: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; color: white;
      font-size: 24px; display: flex; justify-content: center; align-items: center;
      user-select: none; -webkit-user-select: none;
  }
  .control-btn:active { background-color: rgba(255,255,255,0.6); }
</style>
</head>

// ==========================================
let answers = {};

function includesTrait(charVal, answerVal){
  if (Array.isArray(charVal)) return charVal.includes(answerVal);
  if (typeof charVal === 'string' && charVal === '공명') return ['광기','우울','냉정','순수','활발'].includes(answerVal);
  if (typeof charVal === 'string' && ['모든','모든 열','ALL','Any','any'].includes(charVal)) return true;
  return charVal === answerVal;
}

function scoreFor(c, profile){
  let sum = 0;
  for (const key of Object.keys(WEIGHTS)){
    if (includesTrait(c.traits[key], profile[key])) sum += WEIGHTS[key];
  }
  return sum;
}

function matchCharacter(profile){
  const exact = CHARACTERS.find(c => Object.keys(WEIGHTS).every(k => includesTrait(c.traits[k], profile[k])));
  if (exact) return { character: exact, score: scoreFor(exact, profile), profile };

  let best=null, bestScore=-Infinity, bestSpec=-Infinity;
  for (const c of CHARACTERS){
    const s = scoreFor(c, profile);
    const spec = Object.keys(WEIGHTS).reduce((acc,k)=>{
      const v = c.traits[k];
      if (Array.isArray(v)) return acc + 1/Math.max(1,v.length);
      if (typeof v === 'string' && (v === '공명' || ['모든','모든 열','ALL','Any','any'].includes(v))) return acc + 0.25;
      return acc + 1;
    },0);
    if (s > bestScore || (s === bestScore && spec > bestSpec)){
      best = c; bestScore = s; bestSpec = spec;
    }
  }
  return { character: best };
}

function startFavQuiz() {
  answers = {};
  const bgm = document.getElementById('bgm');
  if(bgm) { bgm.currentTime = 0; bgm.play().catch(e=>{}); }
  renderFavQuestion(0);
}

function renderFavQuestion(i) {
  const q = QUESTIONS[i];
  setView(html`
    <div class="qbox">
      <div class="pill">${i+1} / ${QUESTIONS.length}</div>
      <div class="qtitle">${q.title}</div>
      <div class="opts">
        ${q.options.map((op,j)=>`<button class="opt" onclick="chooseFav(${i},${j})">${op.label}</button>`).join('')}
      </div>
    </div>
  `);
}

function chooseFav(i, j) {
  const q = QUESTIONS[i];
  const mapKey = { personality:'성격', archetype:'원형', role:'역할', attack:'공격', line:'배치' }[q.id];
  answers[mapKey] = q.options[j].value;
  
  if(i+1 < QUESTIONS.length) renderFavQuestion(i+1);
  else renderFavTransition(matchCharacter(answers));
}

function renderFavTransition(matchInfo) {
  const bgm = document.getElementById('bgm');
  if(bgm) bgm.pause();
  setView(html`
    <div style="text-align: center; padding: 40px 0;">
      <div class="title" style="margin-bottom: 20px;">사도 영입 진행 중...</div>
      <img src="이미지/픽업연출.gif" style="max-width:100%; border-radius:12px;"/>
      <audio src="음성/픽업.mp3" autoplay></audio>
    </div>
  `);
  setTimeout(() => renderFavResult(matchInfo), 3500);
}

function renderFavResult(match){
  setView(html`
    <div class="result">
      <div class="portrait"><img src="${match.character.img}"/></div>
      <div>
        <div class="title" style="text-align:left;">당신의 최애 사도 후보</div>
        <div class="name">${match.character.name}</div>
        <div class="desc">${match.character.desc}</div>
        <div class="hr"></div>
        <button class="btn" onclick="renderMain()">처음으로 돌아가기</button>
      </div>
    </div>

}

// ==========================================
// [5] 정체성 찾기 로직
// ==========================================
let id_idx = 0;
let id_scores = { race:{}, village:{}, personality:{}, role:{} };

function startIdQuiz() {
  id_idx = 0;
  id_scores = { race:{}, village:{}, personality:{}, role:{} };
  const bgmId = document.getElementById('bgm_id');
  if(bgmId) { bgmId.currentTime = 0; bgmId.play().catch(e=>{}); }
  renderIdQuestion();
}

function renderIdQuestion() {
  const q = ID_QUESTIONS[id_idx];
  setView(html`
    <div class="qbox">
      <div class="pill">Q. ${id_idx + 1} / ${ID_QUESTIONS.length}</div>
      <div class="qtitle">${q.q}</div>
      <div class="opts">
        ${q.opts.map((o, j) => `
          <button class="opt" onclick="chooseId(${id_idx}, ${j})">${o.l}</button>
        `).join('')}
      </div>
    </div>
  `);
}

function chooseId(i, j) {
  const valObj = ID_QUESTIONS[i].opts[j].v;
  Object.keys(valObj).forEach(cat => {
    id_scores[cat][valObj[cat]] = (id_scores[cat][valObj[cat]] || 0) + 1;
  });
  
  id_idx++;
  if(id_idx < ID_QUESTIONS.length) {
    renderIdQuestion();
  } else {
    renderIdTransition();
  }
}

function renderIdTransition() {
  const bgmId = document.getElementById('bgm_id');
  if(bgmId) bgmId.pause();
  
  setView(html`
    <div style="text-align: center; padding: 40px 0;">
      <div class="title" style="margin-bottom: 20px;">엘리아스 신분증 발급 중...</div>
      <img src="이미지/픽업연출.gif" style="max-width:100%; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);"/>
      <audio src="음성/픽업.mp3" autoplay></audio>
    </div>
  `);
  
  setTimeout(() => showIdResult(), 3500);
}

function showIdResult() {
  const getMax = (obj) => Object.keys(obj).reduce((a, b) => obj[a] > obj[b] ? a : b, Object.keys(obj)[0]);
  const rRace = getMax(id_scores.race);
  const rVillage = getMax(id_scores.village);
  const rPerso = getMax(id_scores.personality);
  const rRole = getMax(id_scores.role);

  const imgRace = `이미지/${rRace}.png`;
  const imgPerso = `이미지/${rPerso}.png`;
  const imgVillage = `이미지/${rVillage}.PNG`;

  setView(html`
    <div class="identity-result-box">
      <div class="title">당신의 엘리아스 정체성</div>
      <div class="hr"></div>
      
      <div class="id-result-images">
        <div class="id-image-item">
          <div class="id-image-label">캐릭터 (종족)</div>
          <img src="${imgRace}" alt="${rRace}" onerror="this.src='이미지/대체.png'" />
          <div class="id-image-value">${rRace}</div>
        </div>
        <div class="id-image-item">
          <div class="id-image-label">성향 (성격)</div>
          <img src="${imgPerso}" alt="${rPerso}" onerror="this.src='이미지/대체.png'" />
          <div class="id-image-value">${rPerso}</div>
        </div>
        <div class="id-image-item">
          <div class="id-image-label">거주지 (장소)</div>
          <img src="${imgVillage}" alt="${rVillage}" onerror="this.src='이미지/대체.png'" />
          <div class="id-image-value">${rVillage}</div>
        </div>
      </div>

      <div style="margin-top: 10px;">
        <span class="id-badge">#${rRace}</span>
        <span class="id-badge">#${rVillage}</span>
        <span class="id-badge">#${rPerso}</span>
        <span class="id-badge">#${rRole}</span>
      </div>
      
      <div style="font-size:18px; line-height:1.6; background:#f9fafb; padding:25px; border-radius:12px; margin-top:20px; border:1px solid #e5e7eb; word-break: keep-all;">
        당신은 <strong>${rVillage}</strong>에 거주하는 <strong>${rPerso}</strong> 성향의 <strong>${rRace} ${rRole}</strong>입니다!<br>
        엘리아스에서 당신의 엉뚱한 활약을 기대할게요!
      </div>
      
      <button class="btn" style="margin-top:25px;" onclick="renderMain()">처음으로 돌아가기</button>
    </div>
  `);
}

// ==========================================
// [6] 돈까스 갤러그 시스템 통합
// ==========================================
let isGameActive = false;
let score = 0;
let animationId;
let frameCount = 0;
let enemies = [];
let bullets = [];
let canvas, ctx;

const player = {
    x: 0, y: 0, width: 180, height: 180, speed: 5, moveDir: 0, state: 'idle', attackTimer: 0,
    draw() {
        let currentImg = imgIdle;
        if (this.state === 'move') currentImg = imgMove;
        else if (this.state === 'attack') currentImg = imgAttack;
        else if (this.state === 'dead') currentImg = imgDead;
        if (currentImg.complete) ctx.drawImage(currentImg, this.x - this.width/2, this.y - this.height/2, this.width, this.height);
    },
    update() {
        if (!isGameActive) return;
        this.x += this.moveDir * this.speed;
        if (this.x < this.width/2) this.x = this.width/2;
        if (this.x > canvas.width - this.width/2) this.x = canvas.width - this.width/2;
        if (this.state === 'attack') {
            this.attackTimer--;
            if (this.attackTimer <= 0) this.state = this.moveDir !== 0 ? 'move' : 'idle';
        } else if (this.state !== 'dead') {
            this.state = this.moveDir !== 0 ? 'move' : 'idle';
        }
    },
    attack() {
        if (!isGameActive || this.state === 'dead') return;
        this.state = 'attack'; this.attackTimer = 15; 
        bullets.push({ x: this.x, y: this.y - this.height/2, speed: 10, radius: 7.5 });
    }
};

function initGalaga() {
    stopAllBgm();
    
    setView(html`
      <div class="title" style="margin-bottom:10px;">🎮 돈까스 갤러그</div>
      <div id="game-container">
          <canvas id="gameCanvas"></canvas>
          
          <div id="score-display" class="hidden" style="position:absolute; top:15px; left:15px; color:white; font-size:24px; font-weight:800; text-shadow:2px 2px 4px #000; z-index:5;">Score: 0</div>
          
          <div id="controls" class="hidden" style="position:absolute; bottom:20px; left:0; width:100%; display:flex; justify-content:space-between; padding:0 20px; box-sizing:border-box; z-index:5;">
              <div id="btn-left" class="control-btn">◀</div>
              <div id="btn-right" class="control-btn">▶</div>
          </div>

          <div id="start-panel" class="game-panel">
              <h2 style="font-size:28px; margin-bottom:20px; text-shadow: 2px 2px 4px #000;">돈까스 획득에<br>도전하겠습니까?</h2>
              <button id="btn-start" class="btn" style="padding:15px 40px; font-size:20px; margin-bottom:10px;">게임 시작</button>
              <button class="btn" style="background:gray; font-size:14px;" onclick="renderMain()">메뉴로 돌아가기</button>
          </div>

          <div id="game-over-panel" class="game-panel hidden">
              <h2 style="font-size:28px; margin-bottom:20px; text-shadow: 2px 2px 4px #000;">돈까스를 획득하는 데<br>실패하였습니다.</h2>
              <button id="btn-restart" class="btn" style="padding:15px 40px; font-size:20px; margin-bottom:10px;">다시 도전?</button>
              <button class="btn" style="background:gray; font-size:14px;" onclick="renderMain()">메뉴로 돌아가기</button>
          </div>
      </div>
    `);

    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    
    player.x = canvas.width / 2;
    player.y = canvas.height - 100;

    document.getElementById('btn-start').addEventListener('click', startGalagaGame);
    document.getElementById('btn-restart').addEventListener('click', startGalagaGame);

    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    const handleMove = (dir) => {
        if (!isGameActive) return;
        if (player.moveDir !== dir && dir !== 0) playSound(moveSound);
        player.moveDir = dir;
    };

    const moveLeft = (e) => { e.preventDefault(); handleMove(-1); };
    const moveRight = (e) => { e.preventDefault(); handleMove(1); };
    const stopMove = (e) => { e.preventDefault(); handleMove(0); };

    btnLeft.addEventListener('touchstart', moveLeft); btnLeft.addEventListener('touchend', stopMove);
    btnRight.addEventListener('touchstart', moveRight); btnRight.addEventListener('touchend', stopMove);
    btnLeft.addEventListener('mousedown', moveLeft); btnLeft.addEventListener('mouseup', stopMove); btnLeft.addEventListener('mouseleave', stopMove);
    btnRight.addEventListener('mousedown', moveRight); btnRight.addEventListener('mouseup', stopMove); btnRight.addEventListener('mouseleave', stopMove);
}

window.addEventListener('keydown', (e) => {
    if (!isGameActive) return;
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') player.moveDir = -1;
    else if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') player.moveDir = 1;
});
window.addEventListener('keyup', (e) => {
    if (!isGameActive) return;
    if ((e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') && player.moveDir === -1) player.moveDir = 0;
    else if ((e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') && player.moveDir === 1) player.moveDir = 0;
});

function startGalagaGame() {
    score = 0; enemies = []; bullets = []; frameCount = 0;
    player.x = canvas.width / 2; player.state = 'idle'; player.moveDir = 0;

    document.getElementById('start-panel').classList.add('hidden');
    document.getElementById('game-over-panel').classList.add('hidden');
    document.getElementById('score-display').classList.remove('hidden');
    document.getElementById('controls').classList.remove('hidden');
    document.getElementById('score-display').innerText = `Score: ${score}`;

    const bgmGame = document.getElementById('bgm_game');
    if(bgmGame) { bgmGame.currentTime = 0; bgmGame.play().catch(e => {}); }

    isGameActive = true;
    gameLoop();
}

function gameLoop() {
    if (!isGameActive) return;

    if (bgImg.complete) ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    player.update();
    player.draw();

    frameCount++;
    if (frameCount % 45 === 0) player.attack();

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.y -= b.speed;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ffeb3b'; ctx.fill();
        if (b.y < 0) bullets.splice(i, 1);
    }

    if (Math.random() < 0.03) {
        enemies.push({
            x: Math.random() * (canvas.width - 60) + 30, y: -40, speed: 3 + Math.random() * 2,
            width: 50, height: 50, seed: Math.random() * 100
        });
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        if (score >= 100) {
            e.x += Math.sin(frameCount * 0.2 + e.seed) * 8; 
            if (e.x < e.width/2) e.x = e.width/2;
            if (e.x > canvas.width - e.width/2) e.x = canvas.width - e.width/2;
        }
        e.y += e.speed;

        if (imgEnemy.complete) ctx.drawImage(imgEnemy, e.x - e.width/2, e.y - e.height/2, e.width, e.height);

        let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
        if (distToPlayer < (player.height/2 + e.height/2 - 15)) { 
            gameOver(); return; 
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            let distToBullet = Math.hypot(b.x - e.x, b.y - e.y);
            if (distToBullet < e.height/2 + b.radius) {
                score += 10;
                document.getElementById('score-display').innerText = `Score: ${score}`;
                playSound(hitSound);
                enemies.splice(i, 1); bullets.splice(j, 1); break;
            }
        }
        if (e && e.y > canvas.height + 50) enemies.splice(i, 1);
    }

    animationId = requestAnimationFrame(gameLoop);
}

function gameOver() {
    isGameActive = false;
    cancelAnimationFrame(animationId);
    player.state = 'dead';
    
    if (bgImg.complete) ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    player.draw(); 

    const bgmGame = document.getElementById('bgm_game');
    if(bgmGame) bgmGame.pause();
    playSound(gameOverSound);

    document.getElementById('score-display').classList.add('hidden');
    document.getElementById('controls').classList.add('hidden');
    document.getElementById('game-over-panel').classList.remove('hidden');
}

// 앱 시작
renderMain();

</script>
